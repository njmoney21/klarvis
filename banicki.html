<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BANICKI — Garten- und Landschaftsbau</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      background: #0a0f0a;
      font-family: system-ui, sans-serif;
      overflow-x: hidden;
    }

    .scroll-container {
      height: 400vh;
      position: relative;
    }

    .sticky-viewport {
      position: sticky;
      top: 0;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100% !important;
      height: 100% !important;
      z-index: 0;
    }

    .overlay {
      position: absolute;
      top: 50%;
      left: clamp(32px, 6vw, 80px);
      transform: translateY(-50%);
      pointer-events: none;
      z-index: 10;
    }

    .brand-name {
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.12em;
      line-height: 1;
      text-shadow: 0 2px 20px rgba(0,0,0,0.6);
    }

    .rule {
      width: 40px;
      height: 2px;
      background: rgba(255,255,255,0.35);
      margin: 14px 0;
    }

    .subtitle {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-shadow: 0 2px 20px rgba(0,0,0,0.6);
    }

    .tagline {
      font-size: 0.95rem;
      font-style: italic;
      color: rgba(255,255,255,0.38);
      font-family: Georgia, serif;
      margin-top: 14px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.6);
    }

    .scroll-hint {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.6s ease;
    }
  </style>
</head>
<body>
  <!-- Serve via `npx serve .` — video texture is blocked on file:// protocol -->
  <div class="scroll-container" id="scrollContainer">
    <div class="sticky-viewport" id="stickyViewport">
      <div class="overlay">
        <div class="brand-name">BANICKI</div>
        <div class="rule"></div>
        <div class="subtitle">Garten- und Landschaftsbau</div>
        <div class="tagline">Mache deinen Garten besonders.</div>
      </div>
    </div>
  </div>

  <div class="scroll-hint" id="scrollHint">↓ &nbsp; Scroll</div>

  <video id="video" src="video.mp4" muted playsinline preload="auto" style="display:none"></video>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js';

    const video = document.getElementById('video');
    const scrollContainer = document.getElementById('scrollContainer');
    const stickyViewport = document.getElementById('stickyViewport');

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);
    stickyViewport.style.background = 'none';
    stickyViewport.appendChild(renderer.domElement);

    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    const scene = new THREE.Scene();

    const texture = new THREE.VideoTexture(video);
    texture.minFilter = THREE.LinearFilter;
    texture.magFilter = THREE.LinearFilter;

    const geo = new THREE.PlaneGeometry(2, 2);
    const mat = new THREE.MeshBasicMaterial({ map: texture });
    const mesh = new THREE.Mesh(geo, mat);
    scene.add(mesh);

    function updateTextureAspect() {
      if (!video.videoWidth || !video.videoHeight) return;
      const vA = video.videoWidth / video.videoHeight;
      const wA = window.innerWidth / window.innerHeight;
      if (wA > vA) {
        texture.repeat.set(1, vA / wA);
        texture.offset.set(0, (1 - vA / wA) / 2);
      } else {
        texture.repeat.set(wA / vA, 1);
        texture.offset.set((1 - wA / vA) / 2, 0);
      }
    }

    video.addEventListener('loadedmetadata', () => {
      updateTextureAspect();
      video.play().then(() => video.pause()).catch(() => {});
    });

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      updateTextureAspect();
    });

    let targetTime = 0;
    let lerpedTime = 0;

    let scrollHint = document.getElementById('scrollHint');

    window.addEventListener('scroll', () => {
      if (!isFinite(video.duration)) return;
      const scrollable = scrollContainer.scrollHeight - window.innerHeight;
      if (scrollable <= 0) return;
      const progress = Math.min(Math.max(window.scrollY / scrollable, 0), 1);
      targetTime = progress * video.duration;
      if (scrollHint && window.scrollY > 50) {
        scrollHint.style.opacity = '0';
        scrollHint.addEventListener('transitionend', () => {
          scrollHint.style.display = 'none';
          scrollHint = null;
        }, { once: true });
      }
    });

    function animate() {
      requestAnimationFrame(animate);

      const diff = targetTime - lerpedTime;
      if (Math.abs(diff) > 0.001) {
        lerpedTime += diff * 0.12;
        if (!video.seeking) {
          video.currentTime = lerpedTime;
          texture.needsUpdate = true;
        }
      }

      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
