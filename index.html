<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <title>Runly — Webdesign für lokale Unternehmen</title>
<style>
      #side-panel {
        position: fixed;
        right: 0;
        top: 0;
        height: 100vh;
        width: 320px;
        background: rgba(2,13,20,0.97);
        border-left: 1px solid rgba(0,255,255,0.2);
        z-index: 60;
        transform: translateX(100%);
        transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
        overflow-y: auto;
        padding: 24px 20px;
        padding-top: 64px;
        box-sizing: border-box;
        backdrop-filter: blur(8px);
      }
      #side-panel.open { transform: translateX(0); }
      #panel-close {
        position: absolute;
        top: 14px;
        right: 14px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.08);
        color: rgba(255,255,255,0.4);
        width: 28px;
        height: 28px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s, color 0.15s;
      }
      #panel-close:hover { background: rgba(0,255,255,0.1); color: #00ffff; }
      @media (max-width: 639px) {
        #side-panel {
          width: 100vw;
          height: 65vh;
          top: auto;
          bottom: 0;
          transform: translateY(100%);
          border-left: none;
          border-top: 1px solid rgba(0,255,255,0.2);
          padding-top: 24px;
        }
        #side-panel.open { transform: translateY(0); }
      }
    </style>
  </head>
  <body>

    <!-- Three.js keyboard projection background -->
    <div id="underwater-container"></div>

    <!-- Side panel -->
    <div id="side-panel">
      <button id="panel-close" aria-label="Schließen">✕</button>
      <div id="panel-content"></div>
    </div>

    <!-- React App -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

  </body>
</html>
